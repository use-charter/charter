title = "Charter Gitleaks configuration"

[extend]
useDefault = true

# Charter's own secret-detector unit tests carry intentional fake tokens as
# fixtures (e.g. OPENAI_API_KEY=, SLACK_BOT_TOKEN=, GITHUB_TOKEN= with
# want:true assertions). Allowlist them by path so the scan stays clean across
# the full git history — commit-pinned entries break on any history rewrite and
# only cover the commits that happened to exist when they were written.
[[allowlists]]
description = "Secret-detector test fixtures (intentional fake tokens)"
paths = [
  '''^internal/secrets/.*_test\.go$''',
  '''^internal/rules/secrets/.*_test\.go$''',
]

# Gitignored build-tool caches and local state. These are never committed (the
# `gitleaks git` history scan already covers the committed tree) and are fully
# regenerable, so the `gitleaks dir` working-tree scan must skip them. In
# particular, Moon's cache hash manifests under .moon/cache/ store 64-char
# content hashes that trip the default generic-api-key rule (false positives).
[[allowlists]]
description = "Gitignored build/tool caches (not part of the committed tree)"
paths = [
  '''^\.worktrees/''',
  '''^worktrees/''',
  '''^\.moon/''',
  '''^node_modules/''',
  '''^\.charter/''',
  '''^bin/''',
  '''^dist/''',
  '''^coverage/''',
]

# IndexNow ownership key for use-charter.dev. IndexNow keys are PUBLIC by design:
# the identical value is hosted openly at the site root (web/public/<key>.txt) so
# search engines can verify ownership before accepting URL submissions. It is not
# a secret. Allowlist the literal value (regex, not path) so the generic-api-key
# rule stops flagging it in the submit script and the deploy workflow, without
# masking any genuine leak those files might carry later.
[[allowlists]]
description = "IndexNow public ownership key (not a secret)"
regexes = [
  '''c89d949c2d8cba4afbb3a7104a80e5f8''',
]

# Gitignored local environment files (e.g. web/.env.local holding a Resend key
# for `wrangler pages dev`). `.env*` is gitignored — `.env.example` excepted —
# so these never enter the committed tree; the `gitleaks git` history scan
# still covers everything that is committed. This only suppresses the
# working-tree `gitleaks dir` false positive on developer-local secrets.
[[allowlists]]
description = "Gitignored local environment files (never committed)"
paths = [
  '''(^|/)\.env($|\.)''',
]
