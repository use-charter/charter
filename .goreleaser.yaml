version: 2
project_name: charter

before:
  hooks:
    - go mod tidy
    - go mod verify

builds:
  - id: charter
    main: ./cmd/charter
    binary: charter
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w
      - -X go.use-charter.dev/charter/internal/version.injected={{ .Version }}
      - -X go.use-charter.dev/charter/internal/version.commit={{ .FullCommit }}
      - -X go.use-charter.dev/charter/internal/version.date={{ .CommitDate }}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: charter
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  - artifacts: archive

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

homebrew_casks:
  - repository:
      owner: "{{ .Env.TAP_OWNER }}"
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    # Skip the tap on prereleases (e.g. v0.9.0-rc); publish only on stable tags.
    skip_upload: "auto"
    homepage: "https://use-charter.dev"
    description: "Offline-first scanner that scores a repo's AI-agent readiness"
    license: "Apache-2.0"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/charter"]
          end

release:
  prerelease: auto
  header: |
    ## Charter {{ .Tag }} — AI-agent readiness, scored

    Charter gives any repository a single, deterministic readiness score for AI
    coding agents — and shows you exactly what to fix. It runs entirely on your
    machine: **no LLM calls, no network, no telemetry.**

    ### Why it exists
    Coding agents fail quietly on repos that lack context, leak secrets through
    agent config, or wire up unpinned MCP servers. Charter catches those failure
    modes before an agent does, scores them, and returns prioritized, fixable
    findings — in your terminal, your CI, or a shareable report.

    ### What you get
    - **`charter doctor`** — score a repo against 18 agent-readiness rules
      (context, secrets, MCP safety, agent config, CI/env, testing/autonomy,
      governance), with a per-category scorecard and an interactive `-i` TUI.
    - **`charter fix`** — diff-first repairs; nothing changes without your say-so.
    - **`charter report`** — a self-contained HTML report (also Markdown/JSON) you
      can hand to a teammate or attach to a PR.
    - **`charter explain` · `init` · `suppress` · `version`** round out the
      seven-command surface.
    - **CI-native** — SARIF straight into GitHub Code Scanning, plus the official
      GitHub Action with a score gate that fails the build below your threshold.

    ### Install
    ```sh
    brew install use-charter/tap/charter
    go install go.use-charter.dev/charter/cmd/charter@latest
    ```
    Or download a signed binary for your platform below. Docs → https://use-charter.dev/docs

    ### Verify what you run
    Every release is **cosign-signed with SLSA provenance** and ships an SBOM per
    artifact. Verify the checksums before you trust the binaries:
    ```sh
    cosign verify-blob --bundle checksums.txt.sigstore.json checksums.txt
    ```

  footer: |
    ---
    Apache-2.0 · offline-first · no LLM in the core · built in the open at
    [use-charter/charter](https://github.com/use-charter/charter/commits/{{ .Tag }}).

changelog:
  # Header-only release notes for v1.0 (first tag = all history). The curated
  # release.header/footer above are the notes. Flip to false for v1.1+ to get a
  # delta changelog from the grouped/filtered config below.
  disable: true
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
  filters:
    # Only user-facing changes in the auto-changelog; drop ci/build/chore/docs/
    # test/refactor/perf/style noise (the "Others" dump).
    include:
      - '^feat'
      - '^fix'

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"
