version: 2
project_name: charter

before:
  hooks:
    - go mod tidy
    - go mod verify

builds:
  - id: charter
    main: ./cmd/charter
    binary: charter
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w
      - -X go.use-charter.dev/charter/internal/version.injected={{ .Version }}
      - -X go.use-charter.dev/charter/internal/version.commit={{ .FullCommit }}
      - -X go.use-charter.dev/charter/internal/version.date={{ .CommitDate }}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: charter
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  - artifacts: archive

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

homebrew_casks:
  - repository:
      owner: "{{ .Env.TAP_OWNER }}"
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    # Skip the tap on prereleases (e.g. v0.9.0-rc); publish only on stable tags.
    skip_upload: "auto"
    homepage: "https://use-charter.dev"
    description: "Offline-first scanner that scores a repo's AI-agent readiness"
    license: "Apache-2.0"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/charter"]
          end

release:
  prerelease: auto

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot"
