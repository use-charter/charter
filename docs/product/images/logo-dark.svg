<!--
  Charter wordmark — [C] mark + logotype
  160×36 viewBox · mark scaled 28×28 · logotype in system sans-serif
  Dark variant: #FFFFFF on dark backgrounds
-->
<svg viewBox="0 0 160 36" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Charter">
  <title>Charter</title>

  <!-- [C] mark scaled 0.4375 (64→28), centred vertically in 36px -->
  <g transform="translate(0,4) scale(0.4375)">
    <rect x="3"  y="12" width="4"  height="40" fill="#FFFFFF"/>
    <rect x="3"  y="12" width="11" height="4"  fill="#FFFFFF"/>
    <rect x="3"  y="48" width="11" height="4"  fill="#FFFFFF"/>
    <rect x="57" y="12" width="4"  height="40" fill="#FFFFFF"/>
    <rect x="50" y="12" width="11" height="4"  fill="#FFFFFF"/>
    <rect x="50" y="48" width="11" height="4"  fill="#FFFFFF"/>
    <path d="M41.53,26.5 A11,11 0 1 0 41.53,37.5"
          fill="none" stroke="#FFFFFF"
          stroke-width="6" stroke-linecap="butt"/>
  </g>

  <!-- Logotype -->
  <text x="36" y="18"
        font-family="system-ui,-apple-system,'Segoe UI',sans-serif"
        font-size="18" font-weight="600"
        fill="#FFFFFF"
        dominant-baseline="middle">Charter</text>
</svg>
