<!--
  Charter favicon — vector SVG
  32×32 viewBox · dark background · white mark
  Browsers: Chrome 80+, Firefox 41+, Safari 12+ all support SVG favicons.
  Pair with favicon.ico (generated from this) for older browsers.
-->
<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <title>Charter</title>

  <!-- Background: Charter Dark with subtle rounding -->
  <rect width="32" height="32" rx="5" fill="#0D1117"/>

  <!-- Left bracket [ (bw=2, cl=5.5, bh=20) -->
  <rect x="2"    y="6"    width="2"   height="20" fill="#FFFFFF"/>
  <rect x="2"    y="6"    width="5.5" height="2"  fill="#FFFFFF"/>
  <rect x="2"    y="24"   width="5.5" height="2"  fill="#FFFFFF"/>

  <!-- Right bracket ] -->
  <rect x="28"   y="6"    width="2"   height="20" fill="#FFFFFF"/>
  <rect x="24.5" y="6"    width="5.5" height="2"  fill="#FFFFFF"/>
  <rect x="24.5" y="24"   width="5.5" height="2"  fill="#FFFFFF"/>

  <!--
    Geometric C · centre (16,16) · r=5.5 · stroke-width=3 · 300° arc
    Start −30°: (16 + 5.5·0.866, 16 − 5.5·0.5) = (20.76, 13.25)
    End   +30°: (20.76, 18.75)
  -->
  <path d="M20.76,13.25 A5.5,5.5 0 1 0 20.76,18.75"
        fill="none" stroke="#FFFFFF"
        stroke-width="3" stroke-linecap="butt"/>
</svg>
