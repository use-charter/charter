# `layer` (app/library/tool) and `language` are top-level; `project:` holds
# metadata. Tasks delegate to package.json scripts so the command is defined once.
layer: application
language: typescript

project:
  name: web

# Tasks delegate to package.json scripts via `bun run <script>`:
# package.json owns the command, mise owns the bun version, Moon owns
# orchestration (caching, inputs/outputs, dep graph). One definition each.
tasks:
  dev:
    command: bun
    args:
      - run
      - dev
    options:
      interactive: true
  build:
    command: bun
    args:
      - run
      - build
    inputs:
      - src/**
      - public/**
      - astro.config.mts
      - package.json
    outputs:
      - dist
  check:
    command: bun
    args:
      - run
      - check
    inputs:
      - src/**
      - astro.config.mts
      - package.json
  # Joins the repo-wide `moon run :security` gate — audits dependencies for
  # known advisories.
  security:
    command: bun
    args:
      - run
      - audit
    inputs:
      - package.json
      - bun.lock
