project:
  name: web
  type: node

tasks:
  dev:
    command: astro
    args:
      - dev
    options:
      interactive: true
  build:
    command: astro
    args:
      - build
    inputs:
      - src/**
      - public/**
      - astro.config.mjs
      - package.json
    outputs:
      - dist
  check:
    command: "bun"
    args:
      - "run"
      - "check"
    inputs:
      - src/**
      - astro.config.mjs
      - package.json
