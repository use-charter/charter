# Vendor-operated remote MCP hosts. Baseline allowlist for AE-MCP-002: a remote
# server pointing at one of these hosts is recognized as a known vendor endpoint
# and not flagged. Scope is intentionally limited to major, reputable, officially
# vendor-operated servers — the obscure/hobbyist long tail is deliberately
# excluded so unfamiliar origins still prompt review (an allowlist entry is a
# statement of trust). charter.yaml mcp.trustedRemotes remains the per-repo
# override. Sources: vendor docs + curated remote-MCP indexes (2026-06).
