# Automated dependency updates. Minor/patch bumps are grouped into a single PR
# per ecosystem to keep the noise low; majors come through individually.
version: 2
updates:
  # Web app (Astro + Bun) — package.json dependencies.
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      web-minor-patch:
        update-types: ["minor", "patch"]

  # Go core (CLI) modules.
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      go-minor-patch:
        update-types: ["minor", "patch"]

  # GitHub Actions used by the workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions-minor-patch:
        update-types: ["minor", "patch"]
