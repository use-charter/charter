name: "charter"
description: "Run Charter's root CI entrypoint with the pinned project toolchain."

runs:
  using: "composite"
  steps:
    - name: Set up pinned toolchain
      uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
      with:
        version: 2026.5.15
        install: true
        install_args: --locked
        cache: true
    - name: Run Charter check
      shell: bash
      run: mise x -- moon run :check
