name: "charter"
description: "Run Charter's root CI entrypoint with the pinned project toolchain."

runs:
  using: "composite"
  steps:
    - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
      with:
        version: 2026.5.12
        install: true
        install_args: --locked
        cache: true
    - name: Run Charter check
      shell: bash
      run: mise x -- moon run :check
