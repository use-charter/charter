# Exclude Charter's own detector fixtures from GitHub secret scanning.
#
# Charter is a secret scanner: its tests and rule documentation carry
# intentional, non-functional example secrets (built in-test as `"ghp_" +
# strings.Repeat(...)`, or shown in a rule page to illustrate a finding). These
# are not real credentials and are already allowlisted for the gitleaks scan in
# .gitleaks.toml. Scope the ignore tightly to those locations so genuine secrets
# committed anywhere else still alert.
paths-ignore:
  - "internal/secrets/**"
  - "internal/rules/secrets/**"
  - "testdata/**"
  - "docs/product/rules/**"
