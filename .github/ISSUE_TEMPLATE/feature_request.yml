name: Feature request
description: Suggest a capability or change for Charter.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        For open-ended ideas, consider starting a Discussion first. Charter's
        core is deterministic and offline-first — proposals that add network
        calls or LLM usage to the core are out of scope.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that Charter does not support today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
