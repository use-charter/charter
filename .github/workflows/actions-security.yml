name: Workflow Security

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Classify changes
    runs-on: ubuntu-latest
    outputs:
      actions_security: ${{ steps.classify.outputs.actions_security }}
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0
      - id: classify
        name: Classify changed files
        shell: bash
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: bash scripts/ci/classify-changes.sh

  run-workflow-lint:
    name: Run workflow security checks
    needs: changes
    if: needs.changes.outputs.actions_security == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up pinned toolchain
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          version: 2026.5.15
          install: true
          install_args: --locked
          cache: true
      - name: Run actionlint
        run: mise x -- moon run :actionlint
      - name: Run zizmor
        run: mise x -- moon run :zizmor

  workflow-lint:
    name: Report workflow security status
    needs:
      - changes
      - run-workflow-lint
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Summarize workflow security result
        shell: bash
        env:
          SHOULD_RUN: ${{ needs.changes.outputs.actions_security }}
          RUN_RESULT: ${{ needs.run-workflow-lint.result }}
        run: |
          if [[ "$RUN_RESULT" == "failure" ]]; then
            exit 1
          fi

          if [[ "$SHOULD_RUN" == "true" ]]; then
            echo "Workflow security checks executed."
            exit 0
          fi

          echo "No workflow-related changes detected."
