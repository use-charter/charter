name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Classify changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.classify.outputs.go }}
      web: ${{ steps.classify.outputs.web }}
      docs: ${{ steps.classify.outputs.docs }}
      infra: ${{ steps.classify.outputs.infra }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - id: classify
        name: Classify changed files
        shell: bash
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: bash scripts/ci/classify-changes.sh

  go:
    name: Go (test, lint, build, perf)
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Set up pinned toolchain
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.5.15
          install: true
          install_args: --locked
          cache: true
      - name: Install pinned Bun dependencies
        run: bun install --frozen-lockfile
      - name: Run Go task family
        run: mise x -- moon run root:lint root:vet root:test root:build root:eval
      - name: Run Charter doctor gate
        run: go run ./cmd/charter doctor --path . --threshold 80 --quiet
      - name: Run performance validation
        run: mise x -- moon run root:perf

  web:
    name: Web (astro check, vitest, build)
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up pinned toolchain
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.5.15
          install: true
          install_args: --locked
          cache: true
      - name: Install pinned Bun dependencies
        working-directory: web
        run: bun install --frozen-lockfile
      - name: Run web task family
        run: mise x -- moon run web:check web:test web:build

  docs:
    name: Docs (validate, rule-page drift, mirrors)
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Set up pinned toolchain
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.5.15
          install: true
          install_args: --locked
          cache: true
      - name: Install pinned Bun dependencies
        run: bun install --frozen-lockfile
      - name: Run docs task family
        run: mise x -- moon run docs:lint root:docs

  infra:
    name: Infra (workers typecheck)
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up pinned toolchain
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.5.15
          install: true
          install_args: --locked
          cache: true
      - name: Install pinned Bun dependencies
        working-directory: infra
        run: bun install --frozen-lockfile
      - name: Run infra task family
        run: mise x -- moon run infra:check

  check:
    name: Report CI status
    needs:
      - changes
      - go
      - web
      - docs
      - infra
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Summarize CI result
        shell: bash
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          GO_RESULT: ${{ needs.go.result }}
          WEB_RESULT: ${{ needs.web.result }}
          DOCS_RESULT: ${{ needs.docs.result }}
          INFRA_RESULT: ${{ needs.infra.result }}
        run: |
          failed=false
          for result in "$CHANGES_RESULT" "$GO_RESULT" "$WEB_RESULT" "$DOCS_RESULT" "$INFRA_RESULT"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              failed=true
            fi
          done

          if [[ "$failed" == true ]]; then
            echo "One or more CI lanes failed."
            exit 1
          fi

          echo "All triggered CI lanes passed (skipped lanes had no relevant changes)."
