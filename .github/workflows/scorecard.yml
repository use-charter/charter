name: scorecard-disabled

on:
  workflow_dispatch:

# Scorecard stays disabled while the repository is a private personal repo.
# Re-enable when the repo is public or when a private-repo token strategy is
# intentionally adopted.

permissions:
  contents: read

jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Scorecard intentionally disabled
        run: |
          echo "Scorecard is disabled for the current private personal repo setup."
          echo "Re-enable when the repository is public or when a dedicated private-repo token strategy is adopted."
