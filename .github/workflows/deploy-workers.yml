name: Deploy Workers

# Deploys the Cloudflare edge workers (infra/) on merge to main. The Pages
# landing site and the Mintlify docs deploy through their own native Git
# integrations — only these standalone workers need a deploy step.
#
# Required configuration:
#   secret   CLOUDFLARE_API_TOKEN   — token with Workers Scripts + Workers Routes edit
#   variable CLOUDFLARE_ACCOUNT_ID  — account id (not sensitive; an identifier)
#   variable DEPLOY_WORKERS=true    — enables this workflow's deploy job

on:
  push:
    branches: ["main"]
    paths:
      - "infra/**"
      - ".github/workflows/deploy-workers.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy edge workers
    # Explicit enable gate: set repository variable DEPLOY_WORKERS=true once the
    # CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID secrets exist. Until then this
    # job is skipped (never a failed deploy on a half-configured account).
    if: ${{ vars.DEPLOY_WORKERS == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up pinned toolchain
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          version: 2026.5.15
          install: true
          install_args: --locked
          # No toolchain cache in a publishing workflow (cache-poisoning safety).
          cache: false
      - name: Install pinned Bun dependencies
        working-directory: infra
        run: bun install --frozen-lockfile
      - name: Deploy charter-router
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: infra
          packageManager: bun
          command: deploy --config router/wrangler.toml
      - name: Deploy charter-go-vanity
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: infra
          packageManager: bun
          command: deploy --config go-vanity/wrangler.toml
