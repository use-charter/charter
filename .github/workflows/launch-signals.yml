name: Launch Signals

# Weekly launch-signal monitor (launch-checklist §7). Searches GitHub for
# Charter adoption and mentions and posts new hits into a single tracking issue
# (label `launch-signals`). GitHub search only indexes public repos, so this is
# meaningful once the repo is public; before then it runs clean and empty.
# Runs on a schedule only — never on push — so it gates no PR.

on:
  schedule:
    - cron: "0 13 * * 1" # Mondays 13:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  monitor:
    name: Scan launch signals
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up pinned toolchain
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4
        with:
          version: 2026.5.15
          install: true
          install_args: --locked
          cache: true
      - name: Scan launch signals
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: mise x -- bun scripts/github-actions/launch-signals.ts
