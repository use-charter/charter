name: Launch Signals

# Weekly launch-signal monitor (launch-checklist §7). Searches GitHub for
# Charter adoption and mentions and posts new hits into a single tracking issue
# (label `launch-signals`). GitHub search only indexes public repos, so this is
# meaningful once the repo is public; before then it runs clean and empty.
# Runs on a schedule only — never on push — so it gates no PR.

on:
  schedule:
    - cron: "0 13 * * 1" # Mondays 13:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  monitor:
    name: Scan launch signals
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up pinned toolchain
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.5.15
          install: true
          install_args: --locked
          cache: true
      - name: Scan launch signals
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: mise x -- bun scripts/ci/launch-signals.ts
