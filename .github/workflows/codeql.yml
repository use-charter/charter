name: CodeQL

# Static analysis (GitHub code scanning) for the Go codebase. Runs on Go-source
# changes and weekly; results upload to the Security tab. Required public-repo
# hardening item (Slice 20 launch checklist).

on:
  push:
    branches: ["main"]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/codeql.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/codeql.yml"
  schedule:
    - cron: "27 4 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze Go
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up Go
        # CodeQL's Go build tracer must follow a real go binary; the mise shim
        # breaks indirect tracing ("no code built"). setup-go provides a direct
        # toolchain. cache off — results upload to code scanning (publishing).
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          languages: go
          build-mode: manual
      - name: Build
        # Bare `go` resolves to the mise shim on PATH, which CodeQL registers as
        # its build tracer (CODEQL_ACTION_GO_BINARY). Running via `mise x --`
        # spawns an untraced subprocess → "no code was built".
        run: go build ./...
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@c35d1b164463ee62a100735382aaaa525c5d3496 # codeql-bundle-v2.25.6
        with:
          category: "/language:go"
