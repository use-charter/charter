fileGroups:
  goSources:
    - "cmd/**/*.go"
    - "internal/**/*.go"
    - "go.mod"
    - "go.sum"
  docsSources:
    - "*.md"
    - ".github/**/*.md"
    - "docs/**/*.md"
    - "docs/internal/decisions/**/*.md"
    - "docs/internal/rfcs/**/*.md"
    - "docs/internal/playbooks/**/*.md"
    - "docs/internal/runbooks/**/*.md"
    - "docs/internal/specs/**/*.md"
  workflowSources:
    - ".github/workflows/*.yml"

tasks:
  check:
    command: "bun"
    args:
      - "scripts/noop.ts"
    deps:
      - "lint"
      - "vet"
      - "test"
      - "build"
      - "docs"
      - "security"
      - "eval"
      - "actionlint"
      - "zizmor"
      - "release-check"
  test:
    command: "bun"
    args:
      - "scripts/go-test.ts"
    inputs:
      - "@globs(goSources)"
  perf:
    script: "go test -tags=perf -run TestDoctorPerformance -count=1 -race ./internal/perf"
    options:
      cache: false
  vet:
    command: "go vet ./..."
    inputs:
      - "@globs(goSources)"
  lint:
    script: "gofumpt -l cmd internal && golangci-lint run ./... && bunx tsc --noEmit"
    inputs:
      - "@globs(goSources)"
      - "package.json"
      - "tsconfig.json"
      - "scripts/**/*.ts"
  build:
    command: "bun"
    args:
      - "scripts/go-build.ts"
    inputs:
      - "@globs(goSources)"
  docs:
    command: "bun"
    args:
      - "scripts/scan-doc-todos.ts"
      - ".github"
      - "."
      - "docs/internal/decisions"
      - "docs/internal/rfcs"
      - "docs/internal/playbooks"
      - "docs/internal/runbooks"
      - "docs/internal/specs"
      - "docs"
    inputs:
      - "@globs(docsSources)"
  security:
    script: "gitleaks git --config .gitleaks.toml . --redact --no-banner && gitleaks dir --config .gitleaks.toml . --redact --no-banner && govulncheck ./... && osv-scanner scan source -r ."
    inputs:
      - "@globs(goSources)"
      - "@globs(docsSources)"
      - ".gitleaks.toml"
      - "mise.toml"
      - "mise.lock"
  eval:
    command: "bun"
    args:
      - "scripts/check-file-exists.ts"
      - "evals/README.md"
  actionlint:
    command: "actionlint"
    inputs:
      - "@globs(workflowSources)"
  zizmor:
    command: "zizmor .github/workflows"
    inputs:
      - "@globs(workflowSources)"
  release:
    command: "goreleaser release --clean"
    options:
      cache: false
  release-snapshot:
    command: "goreleaser release --snapshot --clean --skip=sign,publish,homebrew"
    options:
      cache: false
  release-check:
    command: "goreleaser check"
    inputs:
      - ".goreleaser.yaml"
