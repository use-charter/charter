fileGroups:
  goSources:
    - "cmd/**/*.go"
    - "internal/**/*.go"
    - "go.mod"
    - "go.sum"
  docsSources:
    - "*.md"
    - ".github/**/*.md"
    - "docs/**/*.md"
    - "docs/internal/decisions/**/*.md"
    - "docs/internal/rfcs/**/*.md"
    - "docs/internal/playbooks/**/*.md"
    - "docs/internal/runbooks/**/*.md"
    - "docs/internal/specs/**/*.md"
  workflowSources:
    - ".github/workflows/*.yml"

tasks:
  check:
    command: "bun"
    args:
      - "scripts/dev/noop.ts"
    deps:
      - "lint"
      - "vet"
      - "test"
      - "build"
      - "docs"
      - "security"
      - "eval"
      - "actionlint"
      - "zizmor"
      - "release-check"
      - "action:validate"
  test:
    command: "bun"
    args:
      - "scripts/go/go-test.ts"
    inputs:
      - "@globs(goSources)"
  perf:
    command: "bun"
    args:
      - "scripts/go/go-perf.ts"
    options:
      cache: false
  full-test:
    command: "bun"
    args:
      - "scripts/dev/full-test.ts"
    options:
      cache: false
  visual-tour:
    command: "bun"
    args:
      - "scripts/dev/visual-tour.ts"
    options:
      cache: false
      interactive: true
  vet:
    command: "go vet ./..."
    inputs:
      - "@globs(goSources)"
  lint:
    script: "gofumpt -l cmd internal && golangci-lint run ./... && bunx tsc --noEmit"
    inputs:
      - "@globs(goSources)"
      - "package.json"
      - "tsconfig.json"
      - "scripts/**/*.ts"
  build:
    command: "bun"
    args:
      - "scripts/go/go-build.ts"
    inputs:
      - "@globs(goSources)"
  docs:
    command: "bun"
    args:
      - "scripts/docs/scan-doc-todos.ts"
      - ".github"
      - "."
      - "docs/internal/decisions"
      - "docs/internal/rfcs"
      - "docs/internal/playbooks"
      - "docs/internal/runbooks"
      - "docs/internal/specs"
      - "docs"
    deps:
      - "docs-html"
      - "docs-product"
    inputs:
      - "@globs(docsSources)"
      - "docs/product/**/*.mdx"
      - "docs/product/docs.json"
  docs-product-rules:
    command: "bun"
    args:
      - "scripts/docs/generate-rule-pages.ts"
      - "--check"
    inputs:
      - "docs/internal/specs/AE-*.md"
      - "internal/rules/catalog/catalog.go"
      - "scripts/docs/generate-rule-pages.ts"
  docs-product:
    command: "bun"
    args:
      - "scripts/docs/validate-product-docs.ts"
    deps:
      - "docs-product-rules"
    inputs:
      - "docs/product/**/*.mdx"
      - "docs/product/docs.json"
      - "scripts/docs/validate-product-docs.ts"
  docs-html:
    command: "bun"
    args:
      - "scripts/docs/generate-doc-html.ts"
      - "--check"
    inputs:
      - "docs/internal/architecture/charter-architecture-2026.md"
      - "docs/internal/architecture/charter-architecture-2026.html"
      - "docs/internal/audit/charter-v1-audit-checklist.md"
      - "docs/internal/audit/charter-v1-audit-checklist.html"
      - "scripts/docs/generate-doc-html.ts"
      - "package.json"
  security:
    script: "gitleaks git --config .gitleaks.toml . --redact --no-banner && gitleaks dir --config .gitleaks.toml . --redact --no-banner && govulncheck ./... && osv-scanner scan source --config osv-scanner.toml -r ."
    inputs:
      - "@globs(goSources)"
      - "@globs(docsSources)"
      - ".gitleaks.toml"
      - "osv-scanner.toml"
      - "mise.toml"
      - "mise.lock"
  eval:
    command: "bun"
    args:
      - "scripts/dev/check-file-exists.ts"
      - "evals/README.md"
  actionlint:
    command: "actionlint"
    inputs:
      - "@globs(workflowSources)"
  zizmor:
    command: "zizmor .github/workflows"
    inputs:
      - "@globs(workflowSources)"
  release:
    command: "goreleaser release --clean"
    options:
      cache: false
  release-snapshot:
    command: "goreleaser release --snapshot --clean --skip=sign,publish,homebrew"
    options:
      cache: false
  release-check:
    command: "goreleaser check"
    inputs:
      - ".goreleaser.yaml"
